title: "AI 포트폴리오 5일 챌린지"
description: "ChatGPT와 노코드 툴로 나만의 포트폴리오 페이지를 완성합니다"
days: 5
difficulty: "초급"
goal: "포트폴리오 페이지 완성"

missions:
  - day: 1
    title: "포트폴리오 전략 세우기"
    mission: "누구에게 보여줄 포트폴리오인지 정의하고, 구조를 설계합니다"
    duration: "30분"
    tips:
      - "목적이 명확해야 포트폴리오가 강력해집니다"
      - "3개 프로젝트면 충분합니다"

  - day: 2
    title: "경험 정리 & 스토리텔링"
    mission: "ChatGPT로 경험을 정리하고 STAR 기법으로 성과 스토리를 만듭니다"
    duration: "40분"
    tips:
      - "What보다 How와 Result가 중요합니다"
      - "숫자로 성과를 보여주세요"

  - day: 3
    title: "어바웃미 & 스킬 섹션"
    mission: "자기소개 카피를 쓰고 스킬 섹션을 완성합니다"
    duration: "30분"
    tips:
      - "한 줄 소개가 첫인상을 결정합니다"
      - "스킬은 카테고리별로 정리하세요"

  - day: 4
    title: "프로젝트 섹션 디자인"
    mission: "프로젝트 카드를 구성하고 이미지/스크린샷을 준비합니다"
    duration: "40분"
    tips:
      - "썸네일이 클릭을 결정합니다"
      - "Before/After를 보여주세요"

  - day: 5
    title: "배포 & 활용"
    mission: "Notion/Framer로 페이지를 완성하고 배포합니다"
    duration: "30분"
    tips:
      - "링크드인에 바로 연동하세요"
      - "포트폴리오는 살아있는 문서입니다"
